<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>go-gui showcase</title>
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
    canvas { display: block; }
    #loading-overlay {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #1a1a2e;
      transition: opacity 0.4s ease-out;
    }
    #loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 48px; height: 48px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #7c8aff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-label {
      color: rgba(255,255,255,0.6);
      font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #loading-size {
      color: rgba(255,255,255,0.35);
      font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <canvas id="go-gui-canvas"></canvas>
  <div id="loading-overlay">
    <div class="spinner"></div>
    <div id="loading-label">Loading showcase…</div>
    <div id="loading-size"></div>
  </div>
  <script src="wasm_exec.js"></script>
  <script>
    const overlay = document.getElementById('loading-overlay');
    const label = document.getElementById('loading-label');
    const sizeEl = document.getElementById('loading-size');

    const go = new Go();

    async function load() {
      const resp = await fetch("main.wasm");
      const total = Number(resp.headers.get('Content-Length')) || 0;
      const reader = resp.body.getReader();
      const chunks = [];
      let loaded = 0;

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        chunks.push(value);
        loaded += value.length;
        if (total) {
          const pct = Math.round(loaded / total * 100);
          label.textContent = `Loading showcase… ${pct}%`;
          const mb = (loaded / 1024 / 1024).toFixed(1);
          const totalMb = (total / 1024 / 1024).toFixed(1);
          sizeEl.textContent = `${mb} / ${totalMb} MB`;
        }
      }

      const buf = new Uint8Array(loaded);
      let pos = 0;
      for (const chunk of chunks) { buf.set(chunk, pos); pos += chunk.length; }

      label.textContent = 'Starting…';
      sizeEl.textContent = '';

      const { instance } = await WebAssembly.instantiate(buf.buffer, go.importObject);
      // Give the Go app time to render its first frame, then fade out.
      setTimeout(() => overlay.classList.add('hidden'), 800);
      await go.run(instance);
    }

    load();
  </script>
</body>
</html>
